services:
  - type: web
    name: rent-tracker
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install --include=dev && npm --prefix server install && npm --prefix server exec puppeteer browsers install chrome && npm run build
    startCommand: cd server && NODE_ENV=production npm run start:render
    healthCheckPath: /health
    envVars:
      - key: ENABLE_DAILY_SCRAPER
        value: "true"
      - key: DAILY_SCRAPE_TIME
        value: "09:00"
      - key: DAILY_SCRAPE_RUN_ON_STARTUP
        value: "false"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
