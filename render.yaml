services:
  - type: web
    name: rent-tracker
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm --prefix server install && npm run build
    startCommand: cd server && NODE_ENV=production npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_DAILY_SCRAPER
        value: "true"
      - key: DAILY_SCRAPE_TIME
        value: "09:00"
      - key: DAILY_SCRAPE_RUN_ON_STARTUP
        value: "true"
      - key: DATA_DIR
        value: /var/data/rent-tracker
